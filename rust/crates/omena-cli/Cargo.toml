[package]
name = "omena-cli"
autobins = false
version.workspace = true
edition.workspace = true
rust-version.workspace = true
default-run = "omena"
license.workspace = true
publish.workspace = true
description = "CLI checker and transform runner for the Omena CSS workspace"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "P"

[lints]
workspace = true

[features]
default = []
mdl = []
smt-z3 = ["omena-query/smt-z3"]
variational-trace = ["dep:omena-variational"]
zk-audit = ["dep:omena-zk-audit", "omena-zk-audit/zk-audit"]
lightning-lowering = ["dep:lightningcss"]

[[bin]]
name = "omena"
path = "src/main.rs"

[[bin]]
name = "omenad"
path = "src/bin/omenad.rs"

[[bin]]
name = "trace"
path = "src/bin/trace.rs"
required-features = ["variational-trace"]

[dependencies]
clap.workspace = true
omena-checker = { path = "../omena-checker", version = "=0.3.0" }
omena-evidence-graph = { path = "../omena-evidence-graph", version = "=0.3.0" }
omena-sif = { path = "../omena-sif", version = "=0.3.0" }
omena-query = { path = "../omena-query", version = "=0.3.0", features = [
  "hypergraph-ifds",
  "lawvere-trace",
  "salsa-memo",
] }
omena-streaming-ifds = { path = "../omena-streaming-ifds", version = "=0.3.0", features = [
  "streaming-ifds",
] }
omena-syntax = { path = "../omena-syntax", version = "=0.3.0" }
omena-variational = { path = "../omena-variational", version = "=0.3.0", optional = true }
omena-zk-audit = { path = "../omena-zk-audit", version = "=0.3.0", optional = true }
serde.workspace = true
serde_json.workspace = true
serde_yaml_ng.workspace = true
serde_ignored.workspace = true
toml.workspace = true
globset.workspace = true
sha2.workspace = true
sigstore-verify = { version = "0.11.0", default-features = false }
lightningcss = { workspace = true, optional = true }

[dev-dependencies]
omena-query = { path = "../omena-query", features = ["test-support"] }
