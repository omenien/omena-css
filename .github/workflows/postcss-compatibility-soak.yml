name: PostCSS Compatibility Soak

on:
  schedule:
    - cron: "30 7 * * 2,5"
  workflow_dispatch:

concurrency:
  group: postcss-compatibility-soak-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  postcss-compatibility:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - run: pnpm omena-check run rust/omena-cli-postcss-compat
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: PostCSS compatibility soak"
          body: |
            The scheduled inbound PostCSS compatibility runner gate failed.
          workflow-name: PostCSS Compatibility Soak
          job-name: postcss-compatibility
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
