[package]
name = "omena-checker"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Checker rule registry and diagnostic policy boundary for Omena"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R2"

[lints]
workspace = true

[features]
default = []
smt-z3 = ["dep:omena-smt", "omena-smt/smt-z3"]

[dependencies]
omena-abstract-value = { path = "../omena-abstract-value", version = "=0.2.1" }
omena-cascade = { path = "../omena-cascade", version = "=0.2.1" }
omena-cascade-proof = { path = "../omena-cascade-proof", version = "=0.2.1" }
omena-product-hints = { path = "../omena-product-hints", version = "=0.2.1" }
omena-resolver = { path = "../omena-resolver", version = "=0.2.1" }
omena-smt = { path = "../omena-smt", version = "=0.2.1", optional = true }
serde.workspace = true
