name: CI

on:
  pull_request:
    branches: [master, next]
    paths-ignore:
      - .personal_docs/**
  push:
    branches: [master, next]
    paths-ignore:
      - .personal_docs/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    # omena-ci-tier: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/check
      - run: pnpm omena-check doctor
      - run: pnpm omena-check run tooling/orchestrator-inventory
      - run: pnpm omena-check run test/test
      - run: pnpm omena-check run core/build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: dist/
          retention-days: 1
          if-no-files-found: error

  protocol-matrix:
    # omena-ci-tier: protocol
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run test/protocol

  native-runner-matrix:
    # omena-ci-tier: native
    uses: ./.github/workflows/_build-native-binaries.yml

  rust-workspace:
    # omena-ci-tier: rust-workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/workspace
      - run: pnpm omena-check run rust/product-test-execution

  benchmark-gates:
    # omena-ci-tier: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/benchmark/ci-reachability
      - run: pnpm omena-check run rust/benchmark/emitted-css-golden-gate
      - run: pnpm omena-check run rust/benchmark/headline-axis
      - run: pnpm omena-check run rust/benchmark/transform-relex-baseline
      - run: pnpm omena-check run rust/z5-parser-product-cutover

  omena-napi-install:
    # omena-ci-tier: native
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/build/omena-napi
      - run: pnpm omena-check run release/check/packaged-omena-napi-crossplatform

  plugin-consumers:
    # omena-ci-tier: plugin
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - name: Resolve Chrome for plugin browser gates
        shell: bash
        run: |
          set -euo pipefail

          chrome=""
          for candidate in \
            /usr/bin/google-chrome-stable \
            /usr/bin/google-chrome \
            /usr/bin/chromium \
            /usr/bin/chromium-browser; do
            if [ -x "${candidate}" ]; then
              chrome="${candidate}"
              break
            fi
          done

          if [ -z "${chrome}" ]; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
            for candidate in /usr/bin/chromium-browser /usr/bin/chromium; do
              if [ -x "${candidate}" ]; then
                chrome="${candidate}"
                break
              fi
            done
          fi

          if [ -z "${chrome}" ]; then
            echo "::error::Unable to resolve Chrome/Chromium for plugin browser gates" >&2
            exit 1
          fi

          echo "CHROME_BIN=${chrome}" >> "$GITHUB_ENV"
          "${chrome}" --version
      - run: pnpm omena-check run plugin/consumers

  closure-fast:
    # omena-ci-tier: closure-fast
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - id: runtime_query_api
        name: Run runtime query/API hardening
        run: pnpm omena-check run rust/runtime-query-api-hardening
        continue-on-error: true
      - id: product_capability
        name: Run product-facing capability
        run: pnpm omena-check run rust/product-facing-capability
        continue-on-error: true
      - id: theory_generalization
        name: Run theory generalization
        run: pnpm omena-check run rust/theory-generalization
        continue-on-error: true
      - id: query
        name: Run omena-query boundary
        run: pnpm omena-check run rust/omena-query/boundary
        continue-on-error: true
      - id: lsp
        name: Run omena-lsp-server boundary
        run: pnpm omena-check run rust/omena-lsp-server/boundary
        continue-on-error: true
      - id: cascade
        name: Run omena-cascade boundary
        run: pnpm omena-check run rust/omena-cascade/boundary
        continue-on-error: true
      - id: diff_test
        name: Run omena-diff-test boundary
        run: pnpm omena-check run rust/omena-diff-test-boundary
        continue-on-error: true
      - id: train_closure
        name: Run publish-train closure
        run: pnpm omena-check run rust/publish-train-closure
        continue-on-error: true
      - id: inter_crate_pin
        name: Run inter-crate version pin
        run: pnpm omena-check run rust/inter-crate-pin
        continue-on-error: true
      - id: role_boundaries
        name: Run role-boundaries
        run: pnpm omena-check run rust/role-boundaries
        continue-on-error: true
      - id: layer_dependency_exceptions
        name: Run layer-dependency-exceptions
        run: pnpm omena-check run rust/layer-dependency-exceptions
        continue-on-error: true
      - id: product_path_matrix
        name: Run product-path-matrix
        run: pnpm omena-check run rust/product-path-matrix
        continue-on-error: true
      - id: core_layer_hygiene
        name: Run core-layer-hygiene
        run: pnpm omena-check run rust/core-layer-hygiene
        continue-on-error: true
      - id: feature_resolved_reachability
        name: Run feature-resolved-product-reachability
        run: pnpm omena-check run rust/feature-resolved-product-reachability
        continue-on-error: true
      - id: cross_file_reachability
        name: Run cross-file reachability diagnostic
        run: pnpm omena-check run rust/cross-file-reachability-diagnostic
        continue-on-error: true
      - id: streaming_ifds_solver_hygiene
        name: Run streaming IFDS solver hygiene
        run: pnpm omena-check run rust/streaming-ifds-solver-hygiene
        continue-on-error: true
      - id: publish_flags
        name: Run publish-flags
        run: pnpm omena-check run rust/publish-flags
        continue-on-error: true
      - id: naming_consistency
        name: Run naming-consistency
        run: pnpm omena-check run rust/naming-consistency
        continue-on-error: true
      - id: no_split_residue
        name: Run no-split-repo-residue
        run: pnpm omena-check run rust/no-split-repo-residue
        continue-on-error: true
      - id: tag_grammar
        name: Run release tag-grammar
        run: pnpm omena-check run release/check/release-tag-grammar
        continue-on-error: true
      - id: aggregation_complete
        name: Run closure-fast aggregation completeness
        run: pnpm omena-check run rust/closure-fast-aggregation-complete
        continue-on-error: true
      - if: always()
        name: Enforce closure-fast result
        run: |
          echo "runtime_query_api=${{ steps.runtime_query_api.outcome }}"
          echo "product_capability=${{ steps.product_capability.outcome }}"
          echo "theory_generalization=${{ steps.theory_generalization.outcome }}"
          echo "query=${{ steps.query.outcome }}"
          echo "lsp=${{ steps.lsp.outcome }}"
          echo "cascade=${{ steps.cascade.outcome }}"
          echo "diff_test=${{ steps.diff_test.outcome }}"
          echo "train_closure=${{ steps.train_closure.outcome }}"
          echo "inter_crate_pin=${{ steps.inter_crate_pin.outcome }}"
          echo "role_boundaries=${{ steps.role_boundaries.outcome }}"
          echo "layer_dependency_exceptions=${{ steps.layer_dependency_exceptions.outcome }}"
          echo "product_path_matrix=${{ steps.product_path_matrix.outcome }}"
          echo "core_layer_hygiene=${{ steps.core_layer_hygiene.outcome }}"
          echo "feature_resolved_reachability=${{ steps.feature_resolved_reachability.outcome }}"
          echo "cross_file_reachability=${{ steps.cross_file_reachability.outcome }}"
          echo "streaming_ifds_solver_hygiene=${{ steps.streaming_ifds_solver_hygiene.outcome }}"
          echo "publish_flags=${{ steps.publish_flags.outcome }}"
          echo "naming_consistency=${{ steps.naming_consistency.outcome }}"
          echo "no_split_residue=${{ steps.no_split_residue.outcome }}"
          echo "tag_grammar=${{ steps.tag_grammar.outcome }}"
          echo "aggregation_complete=${{ steps.aggregation_complete.outcome }}"
          failed=0
          for outcome in \
            "${{ steps.runtime_query_api.outcome }}" \
            "${{ steps.product_capability.outcome }}" \
            "${{ steps.theory_generalization.outcome }}" \
            "${{ steps.query.outcome }}" \
            "${{ steps.lsp.outcome }}" \
            "${{ steps.cascade.outcome }}" \
            "${{ steps.diff_test.outcome }}" \
            "${{ steps.train_closure.outcome }}" \
            "${{ steps.inter_crate_pin.outcome }}" \
            "${{ steps.role_boundaries.outcome }}" \
            "${{ steps.layer_dependency_exceptions.outcome }}" \
            "${{ steps.product_path_matrix.outcome }}" \
            "${{ steps.core_layer_hygiene.outcome }}" \
            "${{ steps.feature_resolved_reachability.outcome }}" \
            "${{ steps.cross_file_reachability.outcome }}" \
            "${{ steps.streaming_ifds_solver_hygiene.outcome }}" \
            "${{ steps.publish_flags.outcome }}" \
            "${{ steps.naming_consistency.outcome }}" \
            "${{ steps.no_split_residue.outcome }}" \
            "${{ steps.tag_grammar.outcome }}" \
            "${{ steps.aggregation_complete.outcome }}"; do
            if [ "$outcome" != "success" ]; then
              failed=1
            fi
          done
          exit "$failed"

  extension-host-smoke:
    # omena-ci-tier: extension-host
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: dist/
      - run: node ./scripts/restore-native-binary-permissions.mjs
      - run: xvfb-run -a pnpm omena-check run test/extension-host

  package:
    # omena-ci-tier: package
    needs: [verify, native-runner-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: engine-shadow-runner-*
          path: .runner-artifacts
      - run: pnpm omena-check run release/package/prepared
        env:
          OMENA_PACKAGED_RUNNER_MIN_TARGETS: "3"
          OMENA_PACKAGED_RUNNER_REQUIRED_PLATFORMS: linux,darwin,win32
          OMENA_PACKAGED_TSGO_MIN_TARGETS: "3"
          OMENA_PACKAGED_TSGO_REQUIRED_PLATFORMS: linux,darwin,win32
          OMENA_PACKAGED_LSP_SERVER_MIN_TARGETS: "3"
          OMENA_PACKAGED_LSP_SERVER_REQUIRED_PLATFORMS: linux,darwin,win32
      - name: VSIX size gate (max 128 MB)
        run: |
          SIZE=$(wc -c < *.vsix | tr -d ' ')
          echo "VSIX size: $SIZE bytes"
          if [ "$SIZE" -gt 134217728 ]; then
            echo "::error::VSIX exceeds 128 MB budget ($SIZE bytes)"
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error
