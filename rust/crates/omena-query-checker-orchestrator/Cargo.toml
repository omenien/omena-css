[package]
name = "omena-query-checker-orchestrator"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Checker diagnostic orchestration boundary for the Omena query facade"
repository = "https://github.com/yongsk0066/css-module-explainer"
readme = "README.md"

[package.metadata.omena]
role = "R2"

[lints]
workspace = true

[features]
default = []
smt-z3 = ["omena-checker/smt-z3"]

[dependencies]
omena-abstract-value = { path = "../omena-abstract-value" }
omena-checker = { path = "../omena-checker" }
omena-ensemble = { path = "../omena-ensemble", features = ["replica-ensemble"] }
serde.workspace = true
