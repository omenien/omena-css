name: CI Probe

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Focused validation profile
        required: true
        type: choice
        options:
          - orchestrator
          - rust-cli
          - cross-platform-cli
          - rust-workspace
          - closure-diff
          - linux-benchmark
          - verify

concurrency:
  group: ci-probe-${{ github.ref }}-${{ inputs.profile }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    # omena-ci-tier: manual
    if: ${{ inputs.profile != 'cross-platform-cli' }}
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      GH_TOKEN: ${{ github.token }}
      READ_ONLY_GITHUB_TOKEN: ${{ github.token }}
      OMENA_Z5_COMPLEXITY_SLOPE_REPORT: .omena-ci/z5-complexity-slope-report.json
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - name: Install Valgrind
        if: ${{ inputs.profile == 'linux-benchmark' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
          valgrind --version
      - name: Run focused validation
        env:
          OMENA_CI_PROBE_PROFILE: ${{ inputs.profile }}
        run: pnpm omena-check probe "$OMENA_CI_PROBE_PROFILE"

  cli-matrix:
    # omena-ci-tier: manual
    if: ${{ inputs.profile == 'cross-platform-cli' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - name: Run CLI validation
        run: pnpm omena-check probe cross-platform-cli
