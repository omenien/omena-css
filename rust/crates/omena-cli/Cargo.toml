[package]
name = "omena-cli"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
default-run = "omena-cli"
license.workspace = true
publish.workspace = true
description = "CLI checker and transform runner for the Omena CSS workspace"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "P"

[lints]
workspace = true

[features]
default = []
mdl = []
smt-z3 = ["omena-query/smt-z3"]
zk-audit = ["dep:omena-zk-audit", "omena-zk-audit/zk-audit"]

[dependencies]
clap.workspace = true
omena-sif = { path = "../omena-sif", version = "=0.2.1" }
omena-query = { path = "../omena-query", version = "=0.2.1", features = [
  "hypergraph-ifds",
  "lawvere-trace",
] }
omena-streaming-ifds = { path = "../omena-streaming-ifds", version = "=0.2.1", features = [
  "streaming-ifds",
] }
omena-variational = { path = "../omena-variational", version = "=0.2.1" }
omena-zk-audit = { path = "../omena-zk-audit", version = "=0.2.1", optional = true }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
sigstore-verify = { version = "0.8.0", default-features = false }
