name: _Publish Crate Train

# Lane 1 of the Model A direct-publish release (docs 12 §5 / 14 §4).
#
# Publishes the lockstep crate-train (the publishable workspace members emitted by
# scripts/check-rust-publish-train-closure.ts as `canonicalPublishOrder`) to
# crates.io via `cargo publish --workspace --locked` (NO --exclude — the
# non-publishable crates self-skip via `publish = false`), then cuts the
# crate-train GitHub release at the exact published commit.
#
# RFC-3691: Trusted Publishing CANNOT do a crate's FIRST publish. Registry state
# is therefore resolved before semver checking and publication. A tag-triggered
# mixed train selects the protected bootstrap token while any never-published
# names remain; a fully registered train uses OIDC Trusted Publishing.
#
# DORMANT: this workflow only runs on manual workflow_dispatch, on workflow_call from
# a release entrypoint, or on a pushed `release-v*` tag. It is NOT part of per-push CI.

on:
  workflow_call:
    inputs:
      mode:
        description: bootstrap (manual CRATES_IO_TOKEN, for never-published crates) or oidc (Trusted Publishing).
        type: string
        required: false
        default: oidc
      dry_run:
        description: Run `cargo publish --workspace --dry-run` only; upload nothing.
        type: boolean
        required: false
        default: false
      resume:
        description: Resume a partial genesis — exclude crates already published at the workspace version.
        type: boolean
        required: false
        default: false
    secrets:
      CRATES_IO_TOKEN:
        description: crates.io API token for genesis bootstrap (mode=bootstrap only).
        required: false
  workflow_dispatch:
    inputs:
      mode:
        description: Publish auth mode.
        type: choice
        required: true
        default: oidc
        options:
          - oidc
          - bootstrap
      dry_run:
        description: Dry-run the whole-workspace publish without uploading.
        type: boolean
        required: false
        default: false
      resume:
        description: Resume a partial genesis (exclude already-published crates so cargo --workspace does not abort on them).
        type: boolean
        required: false
        default: false
  push:
    tags:
      - "release-v*"

concurrency:
  group: publish-crate-train-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-integrity:
    name: release integrity gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
        with:
          shared-key: release-integrity
      - uses: ./.github/actions/release-integrity

  publish:
    name: publish crate train
    needs: release-integrity
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Protected environment: required reviewers + the CRATES_IO_TOKEN bootstrap secret
    # live here (docs 12 §6 / 14 §7).
    environment: release
    permissions:
      id-token: write # OIDC: rust-lang/crates-io-auth-action (oidc mode); also npm-style provenance posture.
      contents: write # cut the crate-train GitHub release at the published commit.
    env:
      # workflow_call passes inputs.*; a raw `push: tags` trigger has no inputs, so
      # tag publication derives bootstrap vs OIDC from the live registry state.
      PUBLISH_MODE: ${{ startsWith(github.ref, 'refs/tags/release-v') && 'auto' || inputs.mode || 'oidc' }}
      DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
      RESUME: ${{ inputs.resume && 'true' || 'false' }}
    steps:
      # 1. Checkout the EXACT tagged clean commit. The publish step forbids
      #    --allow-dirty; a release must come from an immutable tagged tree.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0
          persist-credentials: false

      # 1b. Node + pnpm deps: the closure gate (step 3) runs via `node --import tsx`
      #     and the publish composite derives the crate count via node, so tsx +
      #     node_modules must be installed.
      - uses: ./.github/actions/setup-pnpm

      # 2. Pinned toolchain. setup-rust-pinned installs the rust-toolchain.toml
      #    channel (1.96.0) and asserts the resolved cargo matches it (docs 14 §3).
      - uses: ./.github/actions/setup-rust-pinned

      # 2a. DEMONSTRATE, don't assert: the all-or-nothing `cargo publish --workspace`
      #     verify behavior is a 1.96.0 property; local dev also pins 1.96.0 via the
      #     repo-root rust-toolchain.toml. Fail loudly if the resolved toolchain is
      #     not the pinned one (docs 12 §5a).
      - name: Assert pinned toolchain (1.96.0)
        shell: bash
        run: |
          set -euo pipefail
          expected="$(awk -F'"' '/^channel/{print $2}' rust/rust-toolchain.toml)"
          active="$(rustup show active-toolchain 2>/dev/null | awk '{print $1}')"
          echo "expected channel: ${expected}"
          echo "active toolchain: ${active}"
          case "${active}" in
            "${expected}"*) echo "toolchain pin OK" ;;
            *)
              echo "::error::active toolchain '${active}' does not match the rust-toolchain.toml pin '${expected}'"
              exit 1
              ;;
          esac

      # 3. Closure gate + canonical wave order. Asserts the train is closed (every
      #    shipped path-dep of a publishable crate is itself publishable) and EMITS
      #    `canonicalPublishOrder` (the genesis topo wave sequence) + the count. The
      #    count is DERIVED here, never hardcoded (docs 12 §3 / §7).
      - name: Publish-train closure gate
        id: closure
        shell: bash
        run: |
          set -euo pipefail
          closure_json="$(node --import tsx ./scripts/check-rust-publish-train-closure.ts)"
          echo "${closure_json}"
          count="$(printf '%s' "${closure_json}" | jq -r '.trainCrateCount')"
          violations="$(printf '%s' "${closure_json}" | jq -r '.closureViolations')"
          if [ "${violations}" != "0" ]; then
            echo "::error::publish-train closure gate reported ${violations} violation(s); train is not publishable"
            exit 1
          fi
          # canonicalPublishOrder is the deps-first wave order; persist it for the
          # genesis runbook / log trail (one crate per line).
          printf '%s' "${closure_json}" | jq -r '.canonicalPublishOrder[]' > canonical-publish-order.txt
          echo "train-crate-count=${count}" >> "$GITHUB_OUTPUT"
          echo "Canonical publish order (${count} crates, deps first):"
          cat canonical-publish-order.txt

      # 4. Resolve the live registry boundary once. Registered names have a
      #    semver baseline; never-published names do not and require bootstrap
      #    authentication for the irreversible publish. Registry/API ambiguity
      #    fails closed rather than silently weakening either rule.
      - name: Resolve crates.io registry state
        id: registry
        shell: bash
        run: |
          set -euo pipefail
          pnpm omena-check run release/check/release-crate-registry-state -- \
            --manifest-path rust/Cargo.toml \
            --order-file canonical-publish-order.txt \
            --output-file crate-registry-state.json

      # 4b. cargo-semver-checks is SKIPPED for 0.2.x genesis-line releases. From
      #     0.3.0 onward every registered train member with a semver-checkable
      #     library API at the baseline tag is compared against crates.io.
      #     First-publish names and non-checkable baselines are reported instead.
      - name: cargo-semver-checks steady-state gate
        shell: bash
        run: |
          set -euo pipefail
          workspace_version="$(node -e "const fs=require('node:fs');const t=fs.readFileSync('rust/Cargo.toml','utf8');const m=t.match(/\\[workspace\\.package\\][\\s\\S]*?version\\s*=\\s*\"([^\"]+)\"/);if(!m)throw new Error('no workspace.package version');process.stdout.write(m[1])")"
          semver_required="$(node -e "const v=process.argv[1].split('.').map(Number);process.stdout.write((v[0] > 0 || v[1] >= 3) ? 'true' : 'false')" "${workspace_version}")"
          echo "workspace version: ${workspace_version}"
          if [ "${semver_required}" != "true" ]; then
            echo "Skipping cargo-semver-checks for ${workspace_version}; 0.2.x is still the genesis-line publish train."
            exit 0
          fi
          cargo install cargo-semver-checks --version 0.48.0 --locked
          while IFS= read -r crate; do
            if [ -z "${crate}" ]; then
              continue
            fi
            if ! jq -e --arg crate "${crate}" '.semverEligible | index($crate) != null' crate-registry-state.json >/dev/null; then
              if jq -e --arg crate "${crate}" '.unregistered | index($crate) != null' crate-registry-state.json >/dev/null; then
                echo "::notice::Skipping cargo-semver-checks for first-publish crate ${crate}; no registry baseline exists."
              elif jq -e --arg crate "${crate}" '.semverNoCheckableLibraryBaseline | index($crate) != null' crate-registry-state.json >/dev/null; then
                echo "::notice::Skipping cargo-semver-checks for ${crate}; its published baseline has no semver-checkable library API."
              elif jq -e --arg crate "${crate}" '.semverAlreadyPublished | index($crate) != null' crate-registry-state.json >/dev/null; then
                echo "::notice::Skipping cargo-semver-checks for ${crate}; this exact version is already published."
              else
                echo "::error::${crate} has no classified semver disposition"
                exit 1
              fi
              continue
            fi
            echo "::group::cargo-semver-checks ${crate}"
            cargo semver-checks check-release \
              --manifest-path rust/Cargo.toml \
              --package "${crate}" \
              --all-features \
              --color never
            echo "::endgroup::"
          done < canonical-publish-order.txt

      # 5. PUBLISH. `cargo publish --workspace --locked` (no exclude). RFC-3691:
      #    bootstrap = manual CRATES_IO_TOKEN (genesis, never-published crates);
      #    oidc = rust-lang/crates-io-auth-action Trusted Publishing (0.3.0+). The
      #    composite forbids --allow-dirty; dry_run uploads nothing (docs 12 §5/§6).
      # 4b. RESUME: `cargo publish --workspace` hard-errors on ANY already-published
      #     member, so a partial genesis (crates.io publish is non-atomic + the
      #     new-crate rate limit aborts mid-train) cannot be re-run as-is. Derive
      #     `--exclude <name>` for every crate already live at the workspace version;
      #     the publish then targets ONLY the remainder, in cargo's deps-first order.
      #     Idempotent across waves (the exclude set grows until nothing remains).
      # Also compute the exclude set on a release-v* TAG push so a re-tag of an
      # already-published version is idempotent (publishes only the remainder, or
      # skips straight to the GitHub release when nothing remains).
      - name: Compute resume exclude set
        id: resume
        if: ${{ env.RESUME == 'true' || startsWith(github.ref, 'refs/tags/release-v') }}
        shell: bash
        run: |
          set -euo pipefail
          echo "exclude_args=${{ steps.registry.outputs.exclude_args }}" >> "$GITHUB_OUTPUT"
          echo "remaining_count=${{ steps.registry.outputs.remaining_count }}" >> "$GITHUB_OUTPUT"
          echo "remaining=${{ steps.registry.outputs.remaining }}" >> "$GITHUB_OUTPUT"
          echo "remaining crates: ${{ steps.registry.outputs.remaining }}"

      - name: Publish crate train
        id: publish
        # Plain dispatch always publishes the requested full workspace. Resume and
        # tag runs skip only when registry classification proves nothing remains.
        # Keep the plain-dispatch branch explicit: GitHub expressions coerce an
        # absent output and the string '0' to the same numeric value.
        if: ${{ (env.RESUME != 'true' && !startsWith(github.ref, 'refs/tags/release-v')) || steps.resume.outputs.remaining_count != '0' }}
        uses: ./.github/actions/cargo-publish-workspace-oidc
        with:
          mode: ${{ steps.registry.outputs.effective_mode }}
          dry-run: ${{ env.DRY_RUN }}
          locked: "true"
          # Empty unless resuming; on resume, excludes the already-published crates.
          extra-args: ${{ steps.resume.outputs.exclude_args }}
        env:
          # Consumed by the composite only in bootstrap mode; harmless/unused in oidc.
          CRATES_IO_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}

      # 6. Resolve the train version (single source of truth: [workspace.package]).
      - name: Resolve train version
        id: version
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          version="$(awk '/^\[workspace\.package\]/{f=1} f&&/^version[[:space:]]*=/{gsub(/[^0-9.]/,"",$0);print;exit}' rust/Cargo.toml)"
          test -n "${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "train version: ${version}"

      # 7. Poll the crates.io sparse index until each just-published crate@=version
      #    resolves, BEFORE the install-smoke build (de-flake index propagation lag;
      #    docs 12 §9 / 14 §3). Skipped on dry-run (nothing was uploaded).
      - name: Wait for crates.io index
        if: ${{ env.DRY_RUN != 'true' }}
        uses: ./.github/actions/registry-poll-until-indexed
        with:
          registry: crates
          name: omena-umbrella
          version: ${{ steps.version.outputs.version }}
          timeout-s: "600"
          backoff-s: "10"

      # 8. Install-smoke: clean `cargo build --locked` of the re-pointed crates.io
      #    consumer fixture against the published `=<version>` train (docs 12 §9 /
      #    14 §6 — the Model-A replacement for the retired git-consumer fixtures).
      - name: Install smoke (crates.io consumer)
        if: ${{ env.DRY_RUN != 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          fixture="rust/external-consumers/crates-io-consumer"
          if [ ! -d "${fixture}" ]; then
            echo "::warning::crates.io install-smoke fixture missing at ${fixture}; skipping (genesis-time artifact, created against the published train — docs 12 §2a / 14 §6)"
            exit 0
          fi
          cargo build --locked --manifest-path "${fixture}/Cargo.toml"
          echo "install-smoke OK against =${{ steps.version.outputs.version }}"

      # 9. Cut the crate-train GitHub release at the EXACT published commit. Idempotent
      #    same-tag re-run: a publish-without-release failure is recoverable by
      #    re-running this workflow on the existing tag (docs 12 §5 / 14 §4). No
      #    binaries on this page; the manifest table + SBOM are emitted by gh-release.
      - name: Cut crate-train GitHub release
        if: ${{ env.DRY_RUN != 'true' && startsWith(github.ref, 'refs/tags/release-v') }}
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ github.ref_name }}
          name: omena crate train ${{ github.ref_name }}
          target_commitish: ${{ github.sha }}
          prerelease: false
          body_path: canonical-publish-order.txt
