[package]
name = "omena-zk-audit"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Zero-knowledge cascade audit protocol contracts for Omena CSS"
repository = "https://github.com/yongsk0066/css-module-explainer"
readme = "README.md"

[package.metadata.omena]
role = "R1"
pillar = "theoretical-rigor"

[lints]
workspace = true

[features]
default = []
zk-audit = [
  "dep:ark-bls12-381",
  "dep:ark-ff",
  "dep:ark-groth16",
  "dep:ark-relations",
  "dep:ark-std",
]
zk-audit-stark = []
zk-audit-binius = []

[dependencies]
ark-bls12-381 = { version = "0.6.0", optional = true, default-features = false, features = [
  "curve",
] }
ark-ff = { version = "0.6.0", optional = true, default-features = false }
ark-groth16 = { version = "0.6.0", optional = true, default-features = false, features = ["std"] }
ark-relations = { version = "0.6.0", optional = true, default-features = false, features = ["std"] }
ark-std = { version = "0.6.0", optional = true, default-features = false, features = ["std"] }
omena-cascade = { path = "../omena-cascade" }
omena-smt = { path = "../omena-smt" }
omena-zk-circuit = { path = "../omena-zk-circuit" }
serde.workspace = true
