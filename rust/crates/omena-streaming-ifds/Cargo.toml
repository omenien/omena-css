[package]
name = "omena-streaming-ifds"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Streaming IFDS contracts for live Omena LSP analysis"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R2"
pillar = "theoretical-rigor"

[lints]
workspace = true

[features]
default = []
streaming-ifds = []
with-frame-rule = []

[dependencies]
omena-abstract-value = { path = "../omena-abstract-value", version = "=0.2.0" }
omena-query = { path = "../omena-query", version = "=0.2.0", features = ["hypergraph-ifds"] }
serde.workspace = true
