name: Release CLI

on:
  push:
    tags:
      - "release-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to (re)build CLI release binaries for (e.g. release-v0.2.0)
        type: string
        required: true

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset: omena-cli-linux-x64
            ext: ""
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            asset: omena-cli-linux-arm64
            ext: ""
          # cross-compiled on arm64 macos-latest (macos-13 Intel runners are scarce)
          - target: x86_64-apple-darwin
            os: macos-latest
            asset: omena-cli-darwin-x64
            ext: ""
          - target: aarch64-apple-darwin
            os: macos-latest
            asset: omena-cli-darwin-arm64
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset: omena-cli-windows-x64
            ext: ".exe"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Rust target
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - uses: ./.github/actions/cache-rust
        with:
          shared-key: release-cli-${{ matrix.target }}
      - name: Build omena-cli release binary
        shell: bash
        run: cargo build --manifest-path rust/Cargo.toml -p omena-cli --release --locked --target ${{ matrix.target }}
      - name: Stage release archive
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          BIN="omena${{ matrix.ext }}"
          SRC="rust/target/${{ matrix.target }}/release/${BIN}"
          test -f "$SRC"
          STAGE="staging/${{ matrix.asset }}"
          mkdir -p "$STAGE"
          cp "$SRC" "$STAGE/${BIN}"
          cp README.md LICENSE "$STAGE/" 2>/dev/null || true
          if [ -n "${{ matrix.ext }}" ]; then
            ARCHIVE="${{ matrix.asset }}.zip"
            ( cd staging && 7z a -tzip "../${ARCHIVE}" "${{ matrix.asset }}" >/dev/null )
          else
            ARCHIVE="${{ matrix.asset }}.tar.gz"
            tar -czf "${ARCHIVE}" -C staging "${{ matrix.asset }}"
          fi
          echo "archive=${ARCHIVE}" >> "$GITHUB_OUTPUT"
      - name: Generate checksum
        shell: bash
        run: |
          set -euo pipefail
          ARCHIVE="${{ steps.stage.outputs.archive }}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "${ARCHIVE}.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "${ARCHIVE}.sha256"
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset }}
          path: |
            ${{ steps.stage.outputs.archive }}
            ${{ steps.stage.outputs.archive }}.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: publish github release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: omena-cli-*
          path: release-assets
          merge-multiple: true
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail
          echo "tag=${{ inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: omena-cli ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release-assets/*.tar.gz
            release-assets/*.zip
            release-assets/*.sha256
