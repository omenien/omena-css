[package]
name = "omena-cli"
version.workspace = true
edition.workspace = true
default-run = "omena-cli"
license.workspace = true
publish.workspace = true
description = "CLI checker and transform runner for the Omena CSS workspace"
repository = "https://github.com/yongsk0066/css-module-explainer"
readme = "README.md"

[lints]
workspace = true

[features]
default = []
mdl = []
zk-audit = ["dep:omena-zk-audit", "omena-zk-audit/zk-audit"]

[dependencies]
clap.workspace = true
omena-bridge = { path = "../omena-bridge" }
omena-sif = { path = "../omena-sif" }
omena-query = { path = "../omena-query" }
omena-zk-audit = { path = "../omena-zk-audit", optional = true }
serde.workspace = true
serde_json.workspace = true
