[package]
name = "omena-transform-passes"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Transform pass registry and DAG planner for Omena CSS"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R2"

[lints]
workspace = true

[features]
default = []
lawvere-trace = ["dep:omena-lawvere"]
# Discharge the cross-layer flatten inversion obligation with the z3 backend.
# Default builds stay solver-free and conservatively block multi-layer flattens.
smt-z3 = ["omena-smt/smt-z3"]

[dependencies]
omena-cascade = { path = "../omena-cascade", version = "=0.2.0" }
omena-incremental = { path = "../omena-incremental", version = "=0.2.0" }
omena-lawvere = { path = "../omena-lawvere", version = "=0.2.0", optional = true }
omena-smt = { path = "../omena-smt", version = "=0.2.0" }
omena-transform-cst = { path = "../omena-transform-cst", version = "=0.2.0" }
omena-parser = { path = "../omena-parser", version = "=0.2.0" }
omena-syntax = { path = "../omena-syntax", version = "=0.2.0" }
serde.workspace = true
serde_json.workspace = true
