[package]
name = "omena-resolver"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Omena resolver boundary over CME source-resolution producer contracts"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R1"

[lints]
workspace = true

[features]
default = []
test-support = ["dep:omena-testkit"]

[dependencies]
omena-engine-input-producers = { path = "../omena-engine-input-producers", version = "=0.3.0" }
omena-testkit = { path = "../omena-testkit", version = "=0.3.0", optional = true }
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
omena-testkit = { path = "../omena-testkit" }
