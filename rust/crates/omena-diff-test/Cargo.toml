[package]
name = "omena-diff-test"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "Differential corpus harness for the Omena CSS parser stack"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "I"

[lints]
workspace = true

[dependencies]
engine-style-parser = { path = "../engine-style-parser", version = "=0.2.1" }
omena-incremental = { path = "../omena-incremental", version = "=0.2.1" }
omena-parser = { path = "../omena-parser", version = "=0.2.1", features = ["internal-oracle"] }
omena-query = { path = "../omena-query", version = "=0.2.1", features = ["salsa-memo"] }
omena-sif = { path = "../omena-sif", version = "=0.2.1" }
omena-testkit = { path = "../omena-testkit", version = "=0.2.1" }
omena-value-lattice = { path = "../omena-value-lattice", version = "=0.2.1" }
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
omena-lsp-server = { path = "../omena-lsp-server", version = "=0.2.1", features = ["test-support"] }
