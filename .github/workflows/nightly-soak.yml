name: Nightly Soak

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-soak-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tsgo-operational:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/build
      - run: pnpm omena-check run tsgo/release-batch
      - run: pnpm omena-check run tsgo/real-project-corpus
      - run: pnpm omena-check run tsgo/lsp-server-smoke
      - run: pnpm omena-check bundle tsgo/operational/lane

  ts7-phase-a:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/build
      - run: pnpm omena-check bundle ts7/phase-a/readiness
      - run: pnpm omena-check bundle ts7/phase-a/shadow
      - run: pnpm omena-check run ts7/phase-a/stability

  selected-query-default:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/selected-query/default-candidate

  checker-release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/checker/release-gate-shadow

  # NOTE: rust/omena-css/h1-readiness runs once nightly in omena-css-drift.yml
  # (08:00, green there). The duplicate 90-min soft run that lived here was removed
  # to stop running the same composite twice an hour apart (CI-hardening N7 dedup).
  # The chronic nightly-soak red is the checker-release-gate / cargo-fuzz flake, a
  # separate deferred investigation — NOT this h1-readiness duplicate.
