name: Nightly Soak

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-soak-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  sdk-cross-surface-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/setup-wasm-pack
      - run: rustup target add wasm32-unknown-unknown
      - run: pnpm omena-check run rust/omena-cross-surface-parity-full
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: nightly-soak / sdk-cross-surface-parity"
          body: |
            The scheduled SDK cross-surface parity lane failed.
          workflow-name: Nightly Soak
          job-name: sdk-cross-surface-parity
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  tsgo-operational:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/build
      - run: pnpm omena-check run core/build/omena-napi
      - run: pnpm omena-check run tsgo/release-batch
      - run: pnpm omena-check run tsgo/real-project-corpus
      - run: pnpm omena-check run tsgo/lsp-server-smoke
      - run: pnpm omena-check bundle tsgo/operational/lane
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: nightly-soak / tsgo-operational"
          body: |
            The scheduled TS Go operational lane failed.
          workflow-name: Nightly Soak
          job-name: tsgo-operational
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  ts7-phase-a:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/build
      - run: pnpm omena-check run core/build/omena-napi
      - run: pnpm omena-check bundle ts7/phase-a/readiness
      - run: pnpm omena-check bundle ts7/phase-a/shadow
      - run: pnpm omena-check run ts7/phase-a/stability
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: nightly-soak / ts7-phase-a"
          body: |
            The scheduled TS7 phase-A lane failed.
          workflow-name: Nightly Soak
          job-name: ts7-phase-a
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  selected-query-default:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/build/omena-napi
      - run: pnpm omena-check run rust/selected-query/default-candidate
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: nightly-soak / selected-query-default"
          body: |
            The scheduled selected-query default-candidate lane failed.
          workflow-name: Nightly Soak
          job-name: selected-query-default
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  checker-release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/checker/release-gate-shadow
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: nightly-soak / checker-release-gate"
          body: |
            The scheduled checker release-gate shadow lane failed.
          workflow-name: Nightly Soak
          job-name: checker-release-gate
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  sass-spec-conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/omena-diff-test-sass-spec-import
      - run: pnpm omena-check run rust/omena-diff-test-sass-spec-oracle
      - run: pnpm omena-check run rust/omena-diff-test-sass-spec-upstream-scale-fetch
      - run: pnpm omena-check run rust/omena-diff-test-sass-spec-scale
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: nightly-soak / sass-spec-conformance"
          body: |
            The scheduled sass-spec conformance lane failed.
          workflow-name: Nightly Soak
          job-name: sass-spec-conformance
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  oss-corpus-farm:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/build/omena-napi
      - run: pnpm omena-check run rust/oss-corpus-farm
        env:
          OMENA_OSS_CORPUS_CAPTURE_RAW: "1"
          OMENA_OSS_CORPUS_CAPTURE_DIR: .omena-oss-corpus-farm-captures
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: nightly-soak / oss-corpus-farm"
          body: |
            The scheduled OSS corpus farm lane failed. Raw reproducer fixtures
            are captured when the checker reaches a reproducible corpus failure.
          workflow-name: Nightly Soak
          job-name: oss-corpus-farm
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: oss-corpus-farm-raw-reproducers
          path: .omena-oss-corpus-farm-captures
          if-no-files-found: ignore

  streaming-ifds-settle-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/streaming-ifds-settle-soak
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: nightly-soak / streaming-ifds-settle-soak"
          body: |
            The scheduled streaming IFDS settle soak lane failed.
          workflow-name: Nightly Soak
          job-name: streaming-ifds-settle-soak
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # NOTE: rust/omena-css/h1-readiness runs once nightly in omena-css-drift.yml
  # (08:00, green there). The duplicate 90-min soft run that lived here was removed
  # to stop running the same composite twice an hour apart (CI-hardening N7 dedup).
  #
  # The chronic nightly-soak red (~2026-06-01..06-14) was the checker-release-gate
  # job, NOT a cargo-fuzz flake. It was a 3-check chain of drift that ONLY this
  # nightly release bundle runs (not PR/push CI), so it sat red for ~2 weeks:
  #   1. check-rust-omena-syntax-parser-cst-equivalence.ts — asserted parser symbols
  #      (`syntax()`, ParserCstEquivalenceSummaryV0, ...) in omena-parser/src/lib.rs,
  #      but a module split moved them to parse.rs/summaries.rs. Fixed: scan whole crate.
  #   2. check-rust-omena-syntax-extraction-decision.ts — same lib.rs-only drift. Fixed: same.
  #   3. check-rust-omena-cli-soundiness-report.ts — stale FIXTURE: it expected an
  #      unresolved `@use` to yield a suppressible `missingSassSymbol`, but per omena-cli
  #      #33 an unreadable external edge now surfaces only `unresolvedExternalReference`
  #      (intended, not a regression). Fixed: suppress a LOCAL undefined Sass var instead.
