[package]
name = "omena-lsp-server"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Rust LSP server boundary scaffold for Omena CSS Modules"
repository = "https://github.com/omenien/omena-css"

[package.metadata.omena]
role = "P"

[lints]
workspace = true

[features]
default = ["salsa-style-diagnostics", "parallel-style-diagnostics"]
test-support = ["omena-query/test-support"]
# RFC 0009 Pillar B (rfcs#65): route workspace style diagnostics through the
# salsa-memoized query layer. `--no-default-features` preserves the
# straight-line path; equivalence between the two is gated by
# omena-diff-test's salsaMemoizedVsFromScratchEquivalence oracle.
salsa-style-diagnostics = ["omena-query/salsa-memo"]
# RFC 0009 Pillar F (rfcs#68): compute memo-eligible style diagnostics waves
# on a bounded rayon pool over fixed-revision salsa read views. Publish order
# stays byte-identical to the serial arm; equivalence is gated by
# omena-diff-test's parallelSalsaViewsVsFromScratchEquivalence oracle. rayon
# stays confined to this server binary crate (never wasm/napi-reachable).
parallel-style-diagnostics = ["salsa-style-diagnostics", "dep:rayon"]
smt-z3 = ["omena-query/smt-z3"]

[dependencies]
omena-cascade = { path = "../omena-cascade", version = "=0.3.0" }
omena-incremental = { path = "../omena-incremental", version = "=0.3.0" }
omena-query = { path = "../omena-query", version = "=0.3.0", features = ["hypergraph-ifds"] }
# RFC 0009 Pillar C (rfcs#66): blake3 content addressing for the disk
# diagnostics shard cache reuses the SIF hash substrate (already in the build
# graph transitively via omena-query) instead of adding a new hash dependency.
omena-sif = { path = "../omena-sif", version = "=0.3.0" }
omena-streaming-ifds = { path = "../omena-streaming-ifds", version = "=0.3.0", features = [
  "streaming-ifds",
] }
omena-tsgo-client = { path = "../omena-tsgo-client", version = "=0.3.0" }
rayon = { workspace = true, optional = true }
salsa.workspace = true
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
omena-query = { path = "../omena-query", features = ["test-support"] }
omena-testkit = { path = "../omena-testkit" }
