name: Omena CSS Drift

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: omena-css-drift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/setup-cargo-fuzz
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/omena-css/rustdoc-coverage
      - run: pnpm omena-check run rust/omena-css/h1-readiness
      - name: Escalate drift failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: omena-css-drift / drift"
          body: |
            The scheduled Omena CSS drift report failed and needs investigation.
          workflow-name: Omena CSS Drift
          job-name: drift
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: omena-css-drift-report
          path: .omena-check/**/*.json
          retention-days: 30
          if-no-files-found: ignore
