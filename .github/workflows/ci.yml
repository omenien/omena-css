name: CI

on:
  pull_request:
    branches: [master, next]
    paths-ignore:
      - .personal_docs/**
  push:
    branches: [master, next]
    paths-ignore:
      - .personal_docs/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    # omena-ci-tier: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/check
      - run: pnpm omena-check doctor
      - run: pnpm omena-check run tooling/orchestrator-inventory
      - run: pnpm omena-check bundle contract/engine-v2-contract-idl
      - run: pnpm omena-check run workspace/backend-typecheck-smoke
      - run: pnpm omena-check run contract/type-fact-backend-parity
      - run: pnpm omena-check run test/test
      - run: pnpm omena-check run core/build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: dist/
          retention-days: 1
          if-no-files-found: error

  protocol-matrix:
    # omena-ci-tier: protocol
    # Linux protocol coverage comes from verify's test/test; matrix runs the OS-sensitive legs.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run test/protocol

  native-runner-matrix:
    # omena-ci-tier: native
    uses: ./.github/workflows/_build-native-binaries.yml

  rust-workspace:
    # omena-ci-tier: rust-workspace
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      READ_ONLY_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run rust/workspace
      - run: pnpm omena-check run rust/omena-transform-target/boundary
      - run: pnpm omena-check run rust/product-test-execution
      - run: pnpm omena-check run rust/product-test-coverage-classguard

  benchmark-gates:
    # omena-ci-tier: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
          valgrind --version
      - run: pnpm omena-check run rust/benchmark/ci-reachability
      - run: pnpm omena-check run rust/benchmark/emitted-css-golden-gate
      - run: pnpm omena-check run rust/benchmark/headline-axis
      - run: pnpm omena-check run rust/benchmark/transform-relex-baseline
      - run: pnpm omena-check run rust/z5-parser-product-cutover
      - run: pnpm omena-check run rust/z5-perf-baseline
      - run: pnpm omena-check run rust/z5-perf-per-file-invariant
      - run: pnpm omena-check run rust/z5-perf-complexity-slope
      - run: pnpm omena-check run rust/z5-perf-warmup-wave-count
      - run: pnpm omena-check run rust/z5-perf-no-regression
      - run: pnpm omena-check run rust/bundler-productization-benchmark

  omena-napi-install:
    # omena-ci-tier: native
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm omena-check run core/build/omena-napi
      - run: pnpm omena-check run release/check/packaged-omena-napi-crossplatform

  plugin-consumers:
    # omena-ci-tier: plugin
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - name: Resolve Chrome for plugin browser gates
        shell: bash
        run: |
          set -euo pipefail

          chrome=""
          for candidate in \
            /usr/bin/google-chrome-stable \
            /usr/bin/google-chrome \
            /usr/bin/chromium \
            /usr/bin/chromium-browser; do
            if [ -x "${candidate}" ]; then
              chrome="${candidate}"
              break
            fi
          done

          if [ -z "${chrome}" ]; then
            sudo apt-get update
            sudo apt-get install -y chromium-browser || sudo apt-get install -y chromium
            for candidate in /usr/bin/chromium-browser /usr/bin/chromium; do
              if [ -x "${candidate}" ]; then
                chrome="${candidate}"
                break
              fi
            done
          fi

          if [ -z "${chrome}" ]; then
            echo "::error::Unable to resolve Chrome/Chromium for plugin browser gates" >&2
            exit 1
          fi

          echo "CHROME_BIN=${chrome}" >> "$GITHUB_ENV"
          "${chrome}" --version
      - run: pnpm omena-check run plugin/consumers

  closure-fast:
    # omena-ci-tier: closure-fast
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ github.token }}
      READ_ONLY_GITHUB_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - name: Run closure-fast gates (aggregated)
        run: pnpm omena-check run rust/closure-fast --summary

  extension-host-smoke:
    # omena-ci-tier: extension-host
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: dist/
      - run: node ./scripts/restore-native-binary-permissions.mjs
      - run: xvfb-run -a pnpm omena-check run test/extension-host

  package:
    # omena-ci-tier: package
    needs: [verify, native-runner-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: engine-shadow-runner-*
          path: .runner-artifacts
      - run: pnpm omena-check run release/package/prepared
        env:
          OMENA_PACKAGED_RUNNER_MIN_TARGETS: "3"
          OMENA_PACKAGED_RUNNER_REQUIRED_PLATFORMS: linux,darwin,win32
          OMENA_PACKAGED_TSGO_MIN_TARGETS: "3"
          OMENA_PACKAGED_TSGO_REQUIRED_PLATFORMS: linux,darwin,win32
          OMENA_PACKAGED_LSP_SERVER_MIN_TARGETS: "3"
          OMENA_PACKAGED_LSP_SERVER_REQUIRED_PLATFORMS: linux,darwin,win32
      - name: VSIX size gate (max 128 MB)
        run: |
          SIZE=$(wc -c < *.vsix | tr -d ' ')
          echo "VSIX size: $SIZE bytes"
          if [ "$SIZE" -gt 134217728 ]; then
            echo "::error::VSIX exceeds 128 MB budget ($SIZE bytes)"
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error
