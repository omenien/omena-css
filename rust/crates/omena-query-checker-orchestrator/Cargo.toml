[package]
name = "omena-query-checker-orchestrator"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Checker diagnostic orchestration boundary for the Omena query facade"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R2"

[lints]
workspace = true

[features]
default = []
smt-z3 = ["omena-checker/smt-z3"]

[dependencies]
omena-abstract-value = { path = "../omena-abstract-value", version = "=0.3.0" }
omena-checker = { path = "../omena-checker", version = "=0.3.0" }
omena-product-hints = { path = "../omena-product-hints", version = "=0.3.0" }
serde.workspace = true
