# Dependabot keeps the SHA-pinned GitHub Actions, the Cargo workspace, and the
# pnpm workspace up to date. The repo pins every action to a commit SHA for
# supply-chain integrity (doc 12 §10) — those pins have no other updater and
# would silently rot, so the github-actions ecosystem is the load-bearing one.
# Updates are grouped to keep PR volume low for a solo + AI-agent workflow.
#
# `cooldown` holds a freshly-released version for a few days before proposing it,
# so a compromised release (the npm "Shai-Hulud" worm class) has time to be caught
# and yanked before we pull it. This is the cheap, low-maintenance substitute for
# cargo-vet hard-gating (doc 13 §10 / the CI-hardening research pass).
version: 2
updates:
  # GitHub Actions: .github/workflows/*.yml + the .github/actions/* composites.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"

  # Cargo workspace (rust/). SHA-pinned toolchain is separate (rust-toolchain.toml);
  # this tracks the crate dependency graph behind the published train.
  - package-ecosystem: cargo
    directory: "/rust"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 5
    groups:
      # The oxc crate family must move in lockstep — a solo oxc_* bump is version
      # skew and breaks the build (seen at 0.128→0.134 and again at 0.134→0.135).
      # 0.x family bumps classify as semver-major, so the group covers major too.
      oxc:
        patterns:
          - "oxc_*"
          - "oxc-*"
        update-types:
          - major
          - minor
          - patch
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # rust/fuzz is a SEPARATE Cargo workspace (omena-css-fuzz, its own [workspace]
  # + Cargo.lock, not a member of /rust) — needs its own updater or libfuzzer-sys
  # and its transitive deps rot silently.
  - package-ecosystem: cargo
    directory: "/rust/fuzz"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 3
    groups:
      cargo-fuzz-minor-patch:
        update-types:
          - minor
          - patch

  # pnpm workspace (root pnpm-lock.yaml covers all workspace packages).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
      semver-major-days: 30
    open-pull-requests-limit: 5
    ignore:
      # vsce enforces @types/vscode <= engines.vscode (^1.115.0); raising the
      # engine floor is a product decision, so this bump is manual-only.
      - dependency-name: "@types/vscode"
        versions: [">1.115"]
      # tsgo nightlies have regressed the type-fact protocol twice (20260606.1,
      # 20260609.1 — hover contents.value null / finiteSet→none). Bump manually,
      # gated by check-rust-omena-lsp-server-type-fact-protocol and
      # check-explain-expression-query-consumer.
      - dependency-name: "@typescript/native-preview"
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
