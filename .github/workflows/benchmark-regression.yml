name: Benchmark Regression

on:
  schedule:
    - cron: "30 7 * * 1"
  workflow_dispatch:
    inputs:
      candidate-comparison-lanes:
        description: "Comma-separated comparison lanes to include in the candidate baseline artifact"
        required: false
        type: string
        default: ""
      property-metadata-lookup-probe:
        description: "Lookup implementation used to validate registry-size sensitivity"
        required: false
        type: choice
        options:
          - indexed
          - linear
        default: indexed

concurrency:
  group: benchmark-regression-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  instruction-count-advisory:
    # omena-ci-tier: scheduled
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - name: Install Valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind
          valgrind --version
      - name: Run instruction-count advisory gate
        run: pnpm omena-check run rust/benchmark/instruction-count-advisory
        env:
          OMENA_BENCHMARK_ARTIFACT_PATH: benchmark-artifacts/z5-instruction-count-advisory.json
          OMENA_REACHABILITY_BITSET_ARTIFACT_PATH: benchmark-artifacts/reachability-bitset-decision-v0.json
      - name: Require advisory artifact
        run: test -s benchmark-artifacts/z5-instruction-count-advisory.json
      - name: Require reachability decision artifact
        run: test -s benchmark-artifacts/reachability-bitset-decision-v0.json
      - name: Record z5 perf gate baseline
        run: node --import tsx ./scripts/check-rust-z5-perf-gate-baseline.ts --write
        env:
          OMENA_Z5_CANDIDATE_BASELINE_LANES: ${{ inputs.candidate-comparison-lanes || '' }}
          OMENA_PROPERTY_METADATA_LOOKUP_PROBE: ${{ inputs.property-metadata-lookup-probe || 'indexed' }}
      - name: Require z5 perf gate baseline
        run: test -s rust/crates/omena-benchmarks/baselines/z5-perf-gate-baseline-v0.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: z5-instruction-count-advisory
          path: |
            benchmark-artifacts/z5-instruction-count-advisory.json
            benchmark-artifacts/reachability-bitset-decision-v0.json
            rust/target/iai/omena-benchmarks/z5_instruction_count_advisory/**/*.out
            rust/target/iai/omena-benchmarks/reachability_bitset_decision/**/*.out
          if-no-files-found: error
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: z5-perf-gate-baseline
          path: |
            rust/crates/omena-benchmarks/baselines/z5-perf-gate-baseline-v0.json
            rust/target/iai/**/*.out
          if-no-files-found: error
      - name: Escalate scheduled failure
        if: ${{ failure() && inputs.property-metadata-lookup-probe != 'linear' }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: benchmark-regression / instruction-count-advisory"
          body: |
            The scheduled benchmark instruction-count advisory lane failed.
          workflow-name: Benchmark Regression
          job-name: instruction-count-advisory
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

  wpt-case-count-advisory:
    # omena-ci-tier: scheduled
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - name: Validate WPT case-count baseline policy
        run: pnpm omena-check run rust/omena-diff-test-wpt-perf
      - name: Record WPT case-count runtime
        run: pnpm omena-check run rust/omena-diff-test-wpt-perf-record
      - name: Require WPT case-count artifact
        run: test -s benchmark-artifacts/wpt-case-count-measurement.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wpt-case-count-measurement
          path: benchmark-artifacts/wpt-case-count-measurement.json
          if-no-files-found: error
      - name: Escalate scheduled failure
        if: ${{ failure() }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: benchmark-regression / wpt-case-count-advisory"
          body: |
            The scheduled WPT case-count performance lane failed.
          workflow-name: Benchmark Regression
          job-name: wpt-case-count-advisory
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
