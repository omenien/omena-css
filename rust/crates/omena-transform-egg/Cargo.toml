[package]
name = "omena-transform-egg"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Optional e-graph rewrite boundary for Omena CSS transforms"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R2"

[lints]
workspace = true

[features]
default = []
lawvere-saturation = ["dep:omena-lawvere"]
mdl = []

[dependencies]
egg.workspace = true
omena-lawvere = { path = "../omena-lawvere", version = "=0.2.0", optional = true }
omena-transform-cst = { path = "../omena-transform-cst", version = "=0.2.0" }
omena-transform-passes = { path = "../omena-transform-passes", version = "=0.2.0" }
serde.workspace = true
