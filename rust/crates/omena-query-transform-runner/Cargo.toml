[package]
name = "omena-query-transform-runner"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Transform-runner boundary for the Omena query facade"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R2"

[lints]
workspace = true

[features]
default = []
lawvere-trace = ["omena-transform-passes/lawvere-trace"]

[dependencies]
omena-abstract-value = { path = "../omena-abstract-value", version = "=0.2.1" }
omena-bridge = { path = "../omena-bridge", version = "=0.2.1" }
omena-bundler = { path = "../omena-bundler", version = "=0.2.1" }
omena-evidence-graph = { path = "../omena-evidence-graph", version = "=0.2.1" }
omena-incremental = { path = "../omena-incremental", version = "=0.2.1" }
omena-transform-cst = { path = "../omena-transform-cst", version = "=0.2.1" }
omena-transform-egg = { path = "../omena-transform-egg", version = "=0.2.1" }
omena-transform-passes = { path = "../omena-transform-passes", version = "=0.2.1" }
omena-transform-print = { path = "../omena-transform-print", version = "=0.2.1" }
omena-transform-target = { path = "../omena-transform-target", version = "=0.2.1" }
serde.workspace = true
