[package]
name = "omena-transform-passes"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Transform pass registry and DAG planner for Omena CSS"
repository = "https://github.com/yongsk0066/css-module-explainer"
readme = "README.md"

[package.metadata.omena]
role = "R2"

[lints]
workspace = true

[features]
default = []
lawvere-trace = ["dep:omena-lawvere"]
# Discharge the cross-layer flatten inversion obligation with the z3 backend.
# Default builds stay solver-free and conservatively block multi-layer flattens.
smt-z3 = ["omena-smt/smt-z3"]

[dependencies]
omena-cascade = { path = "../omena-cascade" }
omena-incremental = { path = "../omena-incremental" }
omena-lawvere = { path = "../omena-lawvere", optional = true }
omena-smt = { path = "../omena-smt" }
omena-transform-cst = { path = "../omena-transform-cst" }
omena-parser = { path = "../omena-parser" }
omena-syntax = { path = "../omena-syntax" }
serde.workspace = true
serde_json.workspace = true
