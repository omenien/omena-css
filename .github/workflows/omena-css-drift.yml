name: Omena CSS Drift

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

concurrency:
  group: omena-css-drift-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/setup-cargo-fuzz
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm cme-check run rust/omena-css/rustdoc-coverage
      - run: pnpm cme-check run rust/omena-css/h1-readiness
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: omena-css-drift-report
          path: .cme-check/**/*.json
          retention-days: 30
          if-no-files-found: ignore
