[package]
name = "omena-napi"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "Node native bindings for Omena CSS parser and transform checks"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "P"

[lib]
crate-type = ["cdylib", "rlib"]

[lints]
workspace = true

[dependencies]
napi.workspace = true
napi-derive.workspace = true
omena-query = { path = "../omena-query", version = "=0.3.0", features = ["salsa-memo"] }
serde.workspace = true
serde_json.workspace = true
