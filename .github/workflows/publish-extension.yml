name: Publish Extension

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish"
        required: true
        default: "master"
      channel:
        description: "Release channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - preview
      publish_marketplace:
        description: "Publish to VS Code Marketplace"
        required: true
        default: true
        type: boolean
      publish_openvsx:
        description: "Publish to Open VSX"
        required: true
        default: true
        type: boolean
      create_github_release:
        description: "Create a GitHub release"
        required: true
        default: true
        type: boolean

concurrency:
  group: publish-extension-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  native-runner-matrix:
    uses: ./.github/workflows/_build-native-binaries.yml
    with:
      ref: ${{ github.event.inputs.ref }}
      retention-days: 7

  publish:
    needs: native-runner-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      RELEASE_CHANNEL: ${{ github.event.inputs.channel }}
      PUBLISH_MARKETPLACE: ${{ github.event.inputs.publish_marketplace }}
      PUBLISH_OPENVSX: ${{ github.event.inputs.publish_openvsx }}
      OMENA_PACKAGED_RUNNER_MIN_TARGETS: "3"
      OMENA_PACKAGED_RUNNER_REQUIRED_PLATFORMS: linux,darwin,win32
      OMENA_PACKAGED_TSGO_MIN_TARGETS: "3"
      OMENA_PACKAGED_TSGO_REQUIRED_PLATFORMS: linux,darwin,win32
      OMENA_PACKAGED_LSP_SERVER_MIN_TARGETS: "3"
      OMENA_PACKAGED_LSP_SERVER_REQUIRED_PLATFORMS: linux,darwin,win32
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.inputs.ref }}
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: engine-shadow-runner-*
          path: .runner-artifacts
      - run: ./scripts/publish-extension.sh
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
      - name: Generate SBOM
        run: |
          pnpm dlx @cyclonedx/cyclonedx-npm --ignore-npm-errors --output-format json --output-file sbom.json 2> cyclonedx-npm.log
          node -e 'const fs = require("node:fs"); const sbom = JSON.parse(fs.readFileSync("sbom.json", "utf8")); const components = sbom.components?.length ?? 0; if (components === 0) throw new Error("Generated SBOM has no components"); console.log(`Generated SBOM: ${components} components`);'
      - name: Upload release artifacts
        if: github.event.inputs.create_github_release == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.2
        with:
          name: extension-release-${{ github.run_id }}
          path: |
            *.vsix
            sbom.json
            cyclonedx-npm.log
      - name: Attest build provenance for VSIX
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: "*.vsix"
      - name: Compute release metadata
        id: meta
        run: |
          VERSION=$(jq -r '.version' package.json)
          if [ "${RELEASE_CHANNEL}" = "preview" ]; then
            TAG="vscode-v${VERSION}-preview.${GITHUB_RUN_NUMBER}"
            PRERELEASE=true
            NAME="Omena CSS Modules v${VERSION} Preview"
          else
            TAG="vscode-v${VERSION}"
            PRERELEASE=false
            NAME="Omena CSS Modules v${VERSION}"
          fi
          TARGET_COMMIT="$(git rev-parse "${{ github.event.inputs.ref }}^{commit}")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "target_commit=${TARGET_COMMIT}" >> "$GITHUB_OUTPUT"
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        if: github.event.inputs.create_github_release == 'true'
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          target_commitish: ${{ steps.meta.outputs.target_commit }}
          files: |
            *.vsix
            sbom.json
