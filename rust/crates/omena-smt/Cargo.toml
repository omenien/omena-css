[package]
name = "omena-smt"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "SMT-encoded cascade verification contracts for Omena CSS"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R1"
pillar = "theoretical-rigor"

[lints]
workspace = true

[features]
default = []
smt-stub = []
smt-z3 = ["dep:z3", "z3/gh-release"]

[dependencies]
blake3.workspace = true
omena-cascade = { path = "../omena-cascade", version = "=0.2.0" }
omena-refinement-trait = { path = "../omena-refinement-trait", version = "=0.2.0" }
serde.workspace = true
z3 = { version = "0.20.0", optional = true, default-features = false }
