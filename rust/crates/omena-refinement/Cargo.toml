[package]
name = "omena-refinement"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Refinement type system contracts for Omena cascade analysis"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R1"
pillar = "theoretical-rigor"

[lints]
workspace = true

[features]
default = []
refinement-smt = ["dep:omena-smt"]

[dependencies]
omena-abstract-value = { path = "../omena-abstract-value", version = "=0.3.0" }
omena-cascade = { path = "../omena-cascade", version = "=0.3.0" }
omena-refinement-trait = { path = "../omena-refinement-trait", version = "=0.3.0" }
omena-smt = { path = "../omena-smt", version = "=0.3.0", optional = true }
serde.workspace = true

[package.metadata.docs.rs]
all-features = true
