# cargo-deny policy for the omena workspace.
#
# Pins the policy used by .github/workflows/security-audit.yml
#   cargo deny --manifest-path rust/Cargo.toml check advisories bans sources
#
# Rationale: the weekly audit was GREEN on cargo-deny's built-in defaults (2026-06-01,
# cargo-deny 0.19.8), but `--locked` installs the latest cargo-deny so a future default
# shift could silently change the gate. This file makes the policy EXPLICIT and matches
# the green baseline — it does not escalate any current warning to an error.

[licenses]
# Empirically-verified allow-list: exactly the SPDX identifiers present in the
# current dependency tree (proof-of-green before this list was pinned). Adding the
# list flips the licenses check from "allow anything" to "allow ONLY these" — any
# new dependency with a license outside the set REDs the gate (a deliberate review
# point). Strong copyleft (GPL/AGPL/LGPL) is therefore denied by omission. Do NOT
# pre-add licenses not actually present (e.g. MPL-2.0 / BSD-3-Clause) — keep the
# set tight to the real tree.
allow = [
  "0BSD",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSL-1.0",
  "CC0-1.0",
  "ISC",
  "MIT",
  "MIT-0",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
]

[advisories]
# Security vulnerabilities are always errors in current cargo-deny. Keep yanked + unmaintained
# as warnings to match the green baseline; do not escalate to "deny" without a clean run first.
yanked = "warn"
unmaintained = "workspace"

[bans]
# Baseline has 4 duplicate-version warnings (foldhash, hashbrown, thiserror, thiserror-impl).
# Keep multiple-versions a WARNING so the audit stays green; revisit when the duplicates clear.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# All workspace dependencies resolve from crates.io. Deny unknown sources (matches the default),
# pinning the only allowed registry explicitly.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
