name: Security Audit

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:
  # Also run on dependency-graph changes (closes the ≤7-day poisoned-dep window
  # between weekly crons — CI-hardening 3b).
  pull_request:
    paths:
      - rust/Cargo.lock
      - rust/**/Cargo.toml
      - rust/deny.toml
  push:
    branches: [master, next]
    paths:
      - rust/Cargo.lock
      - rust/**/Cargo.toml
      - rust/deny.toml

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/cache-rust
      # cargo-deny IS the authoritative supply-chain check (same RustSec advisory DB
      # as rustsec/audit-check, but driven by deny.toml — our policy). The separate
      # rustsec/audit-check action was removed: it failed the job on the transitive
      # `derivative` *unmaintained* informational warning, which our policy
      # deliberately does NOT gate (deny.toml [advisories] unmaintained = "workspace");
      # it was also redundant + Node20-deprecated. Vulnerabilities are always errors
      # in cargo-deny, so the gating is unchanged.
      - run: cargo install cargo-deny --locked
      - run: cargo deny --manifest-path rust/Cargo.toml check advisories bans sources licenses
      - name: Escalate scheduled audit failure
        if: ${{ failure() && (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch') }}
        uses: ./.github/actions/escalate-ci-failure
        with:
          title: "CI failure: security-audit / audit"
          body: |
            The scheduled security audit failed.
          workflow-name: Security Audit
          job-name: audit
          run-url: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
