[package]
name = "omena-checker"
version.workspace = true
edition.workspace = true
license.workspace = true
publish.workspace = true
description = "Checker rule registry and diagnostic policy boundary for Omena"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R2"

[lints]
workspace = true

[features]
default = []
smt-z3 = ["omena-smt/smt-z3"]

[dependencies]
omena-abstract-value = { path = "../omena-abstract-value", version = "=0.2.0" }
omena-cascade = { path = "../omena-cascade", version = "=0.2.0" }
omena-categorical = { path = "../omena-categorical", version = "=0.2.0" }
omena-rg-flow = { path = "../omena-rg-flow", version = "=0.2.0" }
omena-resolver = { path = "../omena-resolver", version = "=0.2.0" }
omena-smt = { path = "../omena-smt", version = "=0.2.0" }
omena-variational = { path = "../omena-variational", version = "=0.2.0" }
serde.workspace = true
