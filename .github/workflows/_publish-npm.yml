name: _Publish npm

# Lane2 of the OMENA release fan-out (12 §8 / 14 §4): publish the two public
# npm packages stamped from the crate-train axis (workspace.package.version):
#   - @omena/wasm  (wasm-pack pkg/, name rewritten by finalize-omena-wasm-pkg.mjs)
#   - @omena/napi  (JS loader + types)
#   - @omena/napi-* platform native optionalDependencies built across the matrix
#   - @omena/css-build-adapter, @omena/vite-plugin, @omena/postcss-plugin
#     (optional build-tool integrations, staged from private workspace packages)
#
# DORMANT: manual workflow_dispatch only; never runs on per-push CI. Genesis
# (first @omena/wasm + @omena/napi publish) needs a manual/2FA establish step
# per package — see RELEASING.md. Steady state runs over OIDC provenance.
#
# All packages publish with `npm publish --provenance --access public`
# (Sigstore via id-token: write). The pre-publish guard fails if any
# repository.url is not omenien/omena-css so a stale pre-rebrand URL can never
# be baked into the provenance subject.

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag/sha) to publish from.
        type: string
        required: false
      dry_run:
        description: Build + pack only; do not publish to npm.
        type: boolean
        required: false
        default: true
      publish_wasm:
        description: Publish @omena/wasm when dry_run is false.
        type: boolean
        required: false
        default: true
      publish_napi:
        description: Publish @omena/napi and its native optional packages when dry_run is false.
        type: boolean
        required: false
        default: true
      publish_plugins:
        description: Publish build-tool integration packages when dry_run is false.
        type: boolean
        required: false
        default: false
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (tag/sha) to publish from (default release-v* tag / current ref).
        type: string
        required: false
      dry_run:
        description: Build + pack only; do not publish to npm.
        type: boolean
        required: true
        default: true
      publish_wasm:
        description: Publish @omena/wasm when dry_run is false.
        type: boolean
        required: true
        default: true
      publish_napi:
        description: Publish @omena/napi and its native optional packages when dry_run is false.
        type: boolean
        required: true
        default: true
      publish_plugins:
        description: Publish build-tool integration packages when dry_run is false.
        type: boolean
        required: true
        default: false

concurrency:
  group: publish-npm-${{ inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-integrity:
    # omena-ci-tier: release
    name: release integrity gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-pnpm
      - name: Run release integrity gates
        run: |
          pnpm omena-check run release/check/release-m5-class-value-universe-matrix
          pnpm omena-check run release/check/release-m5-api-freeze-audit
          pnpm omena-check run core/check
          pnpm omena-check run test/test

  # --- 1. Build napi .node binaries across the 5-target genesis matrix --------
  # These match release-cli.yml's target set. Each host emits index.<triple>.node
  # into rust/crates/omena-napi/pkg/; the publish job turns them into scoped
  # @omena/napi-* optional native packages.
  napi-binaries:
    # omena-ci-tier: release
    name: napi ${{ matrix.target }}
    if: ${{ inputs.publish_napi }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            node-file: index.linux-x64-gnu.node
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            node-file: index.linux-arm64-gnu.node
          # x86_64-apple-darwin is cross-compiled on the arm64 macos-latest runner
          # (Apple universal SDK) — macos-13 (Intel) runners are scarce/deprecated
          # and stall the matrix waiting for a runner.
          - target: x86_64-apple-darwin
            os: macos-latest
            node-file: index.darwin-x64.node
          - target: aarch64-apple-darwin
            os: macos-latest
            node-file: index.darwin-arm64.node
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            node-file: index.win32-x64-msvc.node
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-pnpm
      - name: Install Rust target
        shell: bash
        run: rustup target add ${{ matrix.target }}
      - uses: ./.github/actions/cache-rust
        with:
          shared-key: publish-napi-${{ matrix.target }}
      - name: Build napi binary
        shell: bash
        run: >-
          pnpm exec napi build
          --manifest-path rust/crates/omena-napi/Cargo.toml
          --platform --release
          --js-package-name @omena/napi
          --target ${{ matrix.target }}
          -o rust/crates/omena-napi/pkg
      - name: Verify .node produced
        shell: bash
        run: test -f "rust/crates/omena-napi/pkg/${{ matrix.node-file }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: napi-node-${{ matrix.target }}
          path: rust/crates/omena-napi/pkg/${{ matrix.node-file }}
          if-no-files-found: error
          retention-days: 7

  # --- 2. Build wasm, collect napi binaries, publish both ---------------------
  publish:
    # omena-ci-tier: release
    name: publish npm packages
    needs: [release-integrity, napi-binaries]
    if: ${{ always() && needs.release-integrity.result == 'success' && (inputs.publish_wasm || inputs.publish_napi) && (!inputs.publish_napi || needs.napi-binaries.result == 'success') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      WASM_PKG_DIR: rust/crates/omena-wasm/pkg
      NAPI_PKG_DIR: rust/crates/omena-napi/pkg
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-pnpm
      # Install the rust-toolchain.toml-pinned 1.96.0 WITH the wasm32 target ON it —
      # wasm-pack runs cargo from rust/ (1.96.0), so a bare `rustup target add` (which
      # targets the default toolchain) leaves 1.96.0 without wasm32 -> "can't find crate
      # for core". setup-rust-pinned adds the target to the pinned toolchain.
      - uses: ./.github/actions/setup-rust-pinned
        with:
          targets: wasm32-unknown-unknown
      - uses: ./.github/actions/cache-rust
        with:
          shared-key: publish-wasm
      # wasm-pack is a Rust binary (not an npm dep); install the pinned version so
      # build:omena-wasm finds it on PATH (napi uses the @napi-rs/cli npm dep instead).
      - uses: ./.github/actions/setup-wasm-pack

      # 2a. Build @omena/wasm + @omena/napi. Each build script self-finalizes its
      #     pkg/package.json (build:omena-wasm rewrites name->@omena/wasm + repository;
      #     build:omena-napi writes the @omena/napi loader/types manifest plus the
      #     host .node). pkg/ is a gitignored build dir, so these MUST be
      #     regenerated here at publish time.
      - name: Build omena-wasm (pkg + finalized manifest)
        if: ${{ inputs.publish_wasm }}
        run: pnpm omena-check run core/build/omena-wasm
      - name: Build omena-napi (loader + manifest + host .node)
        if: ${{ inputs.publish_napi }}
        run: pnpm omena-check run core/build/omena-napi

      # 2b. Collect the napi matrix .node binaries, then regenerate the platform
      #     optional package directories from the complete binary set.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        if: ${{ inputs.publish_napi }}
        with:
          pattern: napi-node-*
          path: ${{ env.NAPI_PKG_DIR }}
          merge-multiple: true
      - name: Finalize omena-napi package layout
        if: ${{ inputs.publish_napi }}
        run: node ./scripts/finalize-omena-napi-pkg.mjs
      - name: Verify omena-napi platform packages
        if: ${{ inputs.publish_napi }}
        shell: bash
        env:
          OMENA_NAPI_REQUIRED_PACKAGES: "@omena/napi-linux-x64-gnu,@omena/napi-linux-arm64-gnu,@omena/napi-darwin-x64,@omena/napi-darwin-arm64,@omena/napi-win32-x64-msvc"
        run: |
          set -euo pipefail
          pnpm omena-check run release/check/packaged-omena-napi-crossplatform

      # 2c. Coherence guard — repository.url must be omenien/omena-css on BOTH
      #     top-level packages and on every napi platform package (stale-URL guard;
      #     blocks a stale provenance subject). Package versions must equal the
      #     crate-train axis A version.
      - name: Guard package metadata
        shell: bash
        run: |
          set -euo pipefail
          EXPECTED_URL="https://github.com/omenien/omena-css"
          AXIS_A="$(node -e "const fs=require('node:fs');const t=fs.readFileSync('rust/Cargo.toml','utf8');const m=t.match(/\[workspace\.package\][\s\S]*?version\s*=\s*\"([^\"]+)\"/);if(!m)throw new Error('no workspace.package version');process.stdout.write(m[1])")"
          echo "axis-A (workspace) version = ${AXIS_A}"
          package_dirs=()
          if [ "${{ inputs.publish_wasm }}" = "true" ]; then
            package_dirs+=("${WASM_PKG_DIR}")
          fi
          if [ "${{ inputs.publish_napi }}" = "true" ]; then
            package_dirs+=("${NAPI_PKG_DIR}")
            while IFS= read -r -d '' manifest; do
              package_dirs+=("$(dirname "$manifest")")
            done < <(find "${NAPI_PKG_DIR}/npm" -mindepth 2 -maxdepth 2 -name package.json -print0 | sort -z)
          fi
          for dir in "${package_dirs[@]}"; do
            node -e '
              const fs = require("node:fs");
              const path = require("node:path");
              const dir = process.argv[1];
              const expectedUrl = process.argv[2];
              const axisA = process.argv[3];
              const pkg = JSON.parse(fs.readFileSync(path.join(dir, "package.json"), "utf8"));
              const url = typeof pkg.repository === "string" ? pkg.repository : pkg.repository?.url;
              if (url !== expectedUrl) {
                throw new Error(`${dir}: repository.url is ${url}, expected ${expectedUrl}`);
              }
              if (pkg.version !== axisA) {
                throw new Error(`${dir}: version is ${pkg.version}, expected axis-A ${axisA}`);
              }
              console.log(`${dir}: name=${pkg.name} version=${pkg.version} repository OK`);
            ' "$dir" "$EXPECTED_URL" "$AXIS_A"
          done

      # 2d. Publish with provenance. The top-level packages use npm Trusted
      #     Publishing/OIDC. The platform packages are first-published with the
      #     release environment's NPM_AUTO_TOKEN until each package can establish
      #     its own trusted publisher.
      - name: Publish @omena/wasm
        if: ${{ inputs.publish_wasm }}
        shell: bash
        working-directory: ${{ env.WASM_PKG_DIR }}
        env:
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pack_dir="${RUNNER_TEMP:-/tmp}/npm-dry-run-packs"
            mkdir -p "${pack_dir}"
            npm pack --json --pack-destination "${pack_dir}"
          else
            name="$(node -e "const p=require('./package.json'); process.stdout.write(p.name)")"
            version="$(node -e "const p=require('./package.json'); process.stdout.write(p.version)")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} already published; skipping"
            else
              npm publish --provenance --access public
            fi
          fi
      - name: Publish @omena/napi platform packages
        if: ${{ inputs.publish_napi }}
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTO_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
              echo "::error::NPM_AUTO_TOKEN is empty in the 'release' environment — platform package genesis publish needs an npm automation token" >&2
              exit 1
            fi
            npm_userconfig="${RUNNER_TEMP:-/tmp}/omena-npm-token.npmrc"
            printf '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}\n' > "${npm_userconfig}"
            export NPM_CONFIG_USERCONFIG="${npm_userconfig}"
          fi
          publish_dir() {
            local dir="$1"
            local name version
            name="$(node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(p.name)" "${dir}/package.json")"
            version="$(node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(p.version)" "${dir}/package.json")"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              local pack_dir="${RUNNER_TEMP:-/tmp}/npm-dry-run-packs"
              mkdir -p "${pack_dir}"
              (cd "${dir}" && npm pack --json --pack-destination "${pack_dir}")
              return
            fi
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} already published; skipping"
              return
            fi
            (cd "${dir}" && npm publish --provenance --access public)
          }
          while IFS= read -r -d '' manifest; do
            publish_dir "$(dirname "$manifest")"
          done < <(find "${NAPI_PKG_DIR}/npm" -mindepth 2 -maxdepth 2 -name package.json -print0 | sort -z)
      - name: Publish @omena/napi
        if: ${{ inputs.publish_napi }}
        shell: bash
        working-directory: ${{ env.NAPI_PKG_DIR }}
        env:
          NPM_CONFIG_PROVENANCE: "true"
          OMENA_NAPI_REQUIRED_PACKAGES: "@omena/napi-linux-x64-gnu,@omena/napi-linux-arm64-gnu,@omena/napi-darwin-x64,@omena/napi-darwin-arm64,@omena/napi-win32-x64-msvc"
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            pack_dir="${RUNNER_TEMP:-/tmp}/npm-dry-run-packs"
            mkdir -p "${pack_dir}"
            npm pack --json --pack-destination "${pack_dir}"
          else
            name="$(node -e "const p=require('./package.json'); process.stdout.write(p.name)")"
            version="$(node -e "const p=require('./package.json'); process.stdout.write(p.version)")"
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              optional_json="$(npm view "${name}@${version}" optionalDependencies --json || true)"
              node -e '
                const optional = JSON.parse(process.argv[1] || "{}");
                const required = process.argv[2].split(",").filter(Boolean);
                const version = process.argv[3];
                const missing = required.filter((name) => optional[name] !== version);
                if (missing.length > 0) {
                  console.error(
                    `Published @omena/napi@${version} is immutable and does not declare required optional native packages: ${missing.join(", ")}. Bump the crate-train version before publishing this layout.`
                  );
                  process.exit(1);
                }
              ' "${optional_json:-{}}" "${OMENA_NAPI_REQUIRED_PACKAGES}" "${version}"
              echo "${name}@${version} already published with native optional dependencies; skipping"
            else
              npm publish --provenance --access public
            fi
          fi
  publish-plugins:
    # omena-ci-tier: release
    name: publish build-tool packages
    needs: release-integrity
    if: ${{ always() && inputs.publish_plugins && needs.release-integrity.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: read
      id-token: write
    env:
      PLUGIN_PKG_DIR: dist/npm-plugin-packages
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-pnpm
      - name: Stage @omena build-tool packages
        run: pnpm omena-check run core/build/omena-plugin-packages -- --out "${PLUGIN_PKG_DIR}"
      - name: Publish @omena build-tool packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_AUTO_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
        run: |
          set -euo pipefail
          if [ "${{ inputs.dry_run }}" != "true" ]; then
            if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
              echo "::error::NPM_AUTO_TOKEN is empty in the 'release' environment — first publish of build-tool packages needs an npm automation token" >&2
              exit 1
            fi
            npm_userconfig="${RUNNER_TEMP:-/tmp}/omena-npm-token.npmrc"
            printf '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}\n' > "${npm_userconfig}"
            export NPM_CONFIG_USERCONFIG="${npm_userconfig}"
          fi
          publish_dir() {
            local dir="$1"
            local name version
            name="$(node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(p.name)" "${dir}/package.json")"
            version="$(node -e "const fs=require('node:fs'); const p=JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(p.version)" "${dir}/package.json")"
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              local pack_dir="${RUNNER_TEMP:-/tmp}/npm-dry-run-packs"
              mkdir -p "${pack_dir}"
              (cd "${dir}" && npm pack --json --pack-destination "${pack_dir}")
              return
            fi
            if npm view "${name}@${version}" version >/dev/null 2>&1; then
              echo "${name}@${version} already published; skipping"
              return
            fi
            (cd "${dir}" && npm publish --provenance --access public)
          }
          publish_dir "${PLUGIN_PKG_DIR}/css-build-adapter"
          publish_dir "${PLUGIN_PKG_DIR}/vite-plugin"
          publish_dir "${PLUGIN_PKG_DIR}/postcss-plugin"
