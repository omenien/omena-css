[package]
name = "omena-streaming-ifds"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true
description = "Streaming IFDS contracts for live Omena LSP analysis"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "R1"
pillar = "theoretical-rigor"

[lints]
workspace = true

[features]
default = []
streaming-ifds = []
with-frame-rule = []

[dependencies]
omena-abstract-value = { path = "../omena-abstract-value", version = "=0.2.1" }
omena-cross-file-summary = { path = "../omena-cross-file-summary", version = "=0.2.1" }
serde.workspace = true
sha2.workspace = true

[dev-dependencies]
serde_json.workspace = true

[package.metadata.docs.rs]
all-features = true
