name: CI

on:
  pull_request:
    branches: [master, next]
    paths-ignore:
      - .personal_docs/**
  push:
    branches: [master, next, feat/ir-stack-base]
    paths-ignore:
      - .personal_docs/**
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm cme-check run core/check
      - run: pnpm cme-check doctor
      - run: pnpm cme-check run tooling/orchestrator-inventory
      - run: pnpm cme-check run test/test
      - run: pnpm cme-check run core/build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: build-output
          path: dist/
          retention-days: 1
          if-no-files-found: error

  protocol-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/sync-release-metadata
      - run: pnpm cme-check run test/protocol

  native-runner-matrix:
    uses: ./.github/workflows/_build-native-binaries.yml

  closure-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pnpm
      - uses: ./.github/actions/cache-rust
      - uses: ./.github/actions/sync-release-metadata
      - id: m1
        name: Run M1 runtime query/API hardening
        run: pnpm cme-check run rust/m1-runtime-query-api-hardening
        continue-on-error: true
      - id: m2
        name: Run M2 product-facing capability
        run: pnpm cme-check run rust/m2-product-facing-capability
        continue-on-error: true
      - id: m3
        name: Run M3 theoretical moat generalization
        run: pnpm cme-check run rust/m3-theoretical-moat-generalization
        continue-on-error: true
      - id: query
        name: Run omena-query boundary
        run: pnpm cme-check run rust/omena-query/boundary
        continue-on-error: true
      - id: lsp
        name: Run omena-lsp-server boundary
        run: pnpm cme-check run rust/omena-lsp-server/boundary
        continue-on-error: true
      - id: cascade
        name: Run omena-cascade boundary
        run: pnpm cme-check run rust/omena-cascade/boundary
        continue-on-error: true
      - id: diff_test
        name: Run omena-diff-test boundary
        run: pnpm cme-check run rust/omena-diff-test-boundary
        continue-on-error: true
      - id: train_closure
        name: Run publish-train closure
        run: pnpm cme-check run rust/publish-train-closure
        continue-on-error: true
      - if: always()
        name: Enforce closure-fast result
        run: |
          echo "m1=${{ steps.m1.outcome }}"
          echo "m2=${{ steps.m2.outcome }}"
          echo "m3=${{ steps.m3.outcome }}"
          echo "query=${{ steps.query.outcome }}"
          echo "lsp=${{ steps.lsp.outcome }}"
          echo "cascade=${{ steps.cascade.outcome }}"
          echo "diff_test=${{ steps.diff_test.outcome }}"
          echo "train_closure=${{ steps.train_closure.outcome }}"
          failed=0
          for outcome in \
            "${{ steps.m1.outcome }}" \
            "${{ steps.m2.outcome }}" \
            "${{ steps.m3.outcome }}" \
            "${{ steps.query.outcome }}" \
            "${{ steps.lsp.outcome }}" \
            "${{ steps.cascade.outcome }}" \
            "${{ steps.diff_test.outcome }}" \
            "${{ steps.train_closure.outcome }}"; do
            if [ "$outcome" != "success" ]; then
              failed=1
            fi
          done
          exit "$failed"

  extension-host-smoke:
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: dist/
      - run: node ./scripts/restore-native-binary-permissions.mjs
      - run: xvfb-run -a pnpm cme-check run test/extension-host

  package:
    needs: [verify, native-runner-matrix]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/setup-pnpm
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-output
          path: dist/
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: engine-shadow-runner-*
          path: .runner-artifacts
      - run: pnpm cme-check run release/package/prepared
        env:
          CME_PACKAGED_RUNNER_MIN_TARGETS: "3"
          CME_PACKAGED_RUNNER_REQUIRED_PLATFORMS: linux,darwin,win32
          CME_PACKAGED_TSGO_MIN_TARGETS: "3"
          CME_PACKAGED_TSGO_REQUIRED_PLATFORMS: linux,darwin,win32
          CME_PACKAGED_OMENA_LSP_SERVER_MIN_TARGETS: "3"
          CME_PACKAGED_OMENA_LSP_SERVER_REQUIRED_PLATFORMS: linux,darwin,win32
      - name: VSIX size gate (max 128 MB)
        run: |
          SIZE=$(wc -c < *.vsix | tr -d ' ')
          echo "VSIX size: $SIZE bytes"
          if [ "$SIZE" -gt 134217728 ]; then
            echo "::error::VSIX exceeds 128 MB budget ($SIZE bytes)"
            exit 1
          fi
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vsix
          path: "*.vsix"
          if-no-files-found: error
