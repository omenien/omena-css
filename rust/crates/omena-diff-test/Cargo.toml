[package]
name = "omena-diff-test"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false
description = "Differential corpus harness for the Omena CSS parser stack"
repository = "https://github.com/omenien/omena-css"
readme = "README.md"

[package.metadata.omena]
role = "I"

[lints]
workspace = true

[dependencies]
engine-style-parser = { path = "../engine-style-parser", version = "=0.3.0" }
omena-abstract-value = { path = "../omena-abstract-value", version = "=0.3.0" }
omena-benchmarks = { path = "../omena-benchmarks", version = "=0.3.0" }
omena-bundler = { path = "../omena-bundler", version = "=0.3.0" }
omena-cascade = { path = "../omena-cascade", version = "=0.3.0" }
omena-cross-file-summary = { path = "../omena-cross-file-summary", version = "=0.3.0" }
omena-engine-input-producers = { path = "../omena-engine-input-producers", version = "=0.3.0" }
omena-evidence-graph = { path = "../omena-evidence-graph", version = "=0.3.0" }
omena-incremental = { path = "../omena-incremental", version = "=0.3.0" }
omena-parser = { path = "../omena-parser", version = "=0.3.0" }
omena-query = { path = "../omena-query", version = "=0.3.0", features = ["salsa-memo"] }
omena-reachability-datalog-lab = { path = "../omena-reachability-datalog-lab", version = "=0.3.0" }
omena-scss-eval = { path = "../omena-scss-eval", version = "=0.3.0", features = ["scanner-oracle"] }
omena-semantic = { path = "../omena-semantic", version = "=0.3.0" }
omena-sif = { path = "../omena-sif", version = "=0.3.0" }
omena-streaming-ifds = { path = "../omena-streaming-ifds", version = "=0.3.0" }
omena-testkit = { path = "../omena-testkit", version = "=0.3.0" }
omena-transform-cst = { path = "../omena-transform-cst", version = "=0.3.0" }
omena-transform-passes = { path = "../omena-transform-passes", version = "=0.3.0" }
omena-value-lattice = { path = "../omena-value-lattice", version = "=0.3.0" }
serde.workspace = true
serde_json.workspace = true
sha2.workspace = true
toml.workspace = true

[dev-dependencies]
omena-lsp-server = { path = "../omena-lsp-server", version = "=0.3.0", features = ["test-support"] }
